name: Maintain Skill Hub data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh stars and check existing entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/refresh_skill_hub_data.py \
            --root . \
            --verbose

      - name: Commit updates
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: refresh Skill Hub stars and health report"
          file_pattern: "agents/**/*.json agents/**/*.js agents/health-report.json"
