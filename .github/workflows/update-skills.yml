name: Update Codex Skills

# 每周一 UTC 00:00 跑一次（北京时间 8:00）
# 也可以手动触发：Actions 标签 → Update Codex Skills → Run workflow
# 数据变化时直接 commit + push 到 main（不走 PR 流程）
# CF Pages / Vercel 监听到 push 会自动重新部署
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch and stage changes, but don't commit/push)"
        required: false
        default: "false"

permissions:
  contents: write   # 写 main 分支

jobs:
  update:
    name: Fetch and update skills data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🚀 Run fetch-skills.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch-skills.py
          echo "---"
          echo "📊 Final data.js size:"
          wc -l js/data.js

      - name: 🔍 Detect changes
        id: check
        run: |
          if git diff --quiet js/data.js scripts/fetch-skills.py; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected — data is already up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected:"
            git diff --stat js/data.js scripts/fetch-skills.py | tail -5
          fi

      - name: 📝 Commit and push to main
        if: steps.check.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 阶段所有改动（data.js 是数据，scripts 是脚本本身如果有更新）
          git add js/data.js scripts/fetch-skills.py

          # 提交信息里附一些统计
          TOTAL=$(grep -c '"name":' js/data.js || echo "?")
          STARS=$(grep -oE '"stars": [0-9]+' js/data.js | awk '{s+=$2} END {print s}')
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "chore: auto-update Codex skills data

          - Total skills: $TOTAL
          - Total stars:  $STARS
          - Updated at:   $DATE

          Triggered by: \${{ github.event_name }}
          Run:          \${{ github.run_id }}

          [skip ci]" \
            -m "Auto-generated by GitHub Actions. See .github/workflows/update-skills.yml."

          echo "---"
          echo "📤 Pushing to main..."
          git push

      - name: ✅ No changes
        if: steps.check.outputs.changed == 'false'
        run: |
          echo "Nothing to do this run."
          echo "Next scheduled run: Monday 00:00 UTC"
