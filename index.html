<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle">Codex Skills Hub — OpenAI Codex Skills Index</title>
  <meta name="description" data-i18n="pageDescription" content="Curated index of OpenAI Codex skills — official curated, community lists, CLI tools, and general agent skills.">
  <meta property="og:title" data-i18n="ogTitle" content="Codex Skills Hub">
  <meta property="og:description" data-i18n="ogDescription" content="56+ Codex skills from 17 sources — official curated, community lists, CLI tools.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/">
        <span class="logo-icon">🎯</span>
        <div class="logo-copy">
          <h1 class="logo-text" data-i18n="brandName">Codex Skills Hub</h1>
          <p class="logo-subtitle" data-i18n="brandTagline">OpenAI Codex Skills · Official + Community</p>
        </div>
      </a>
      <div class="header-right">
        <div class="header-stats">
          <div class="stat">
            <span class="stat-value" id="stat-skills">56</span>
            <span class="stat-label" data-i18n="statSkills">Skills</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-sources">17</span>
            <span class="stat-label" data-i18n="statSources">来源</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-stars">561k</span>
            <span class="stat-label" data-i18n="statStars">总 ⭐</span>
          </div>
        </div>
        <div class="lang-switcher" role="group" aria-label="Language">
          <button class="lang-btn" data-lang="zh" title="中文" aria-label="中文">中</button>
          <button class="lang-btn" data-lang="en" title="English" aria-label="English">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 搜索 + 分类 Tab -->
    <section class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input
          id="search"
          type="search"
          class="search-input"
          data-i18n-placeholder="searchPlaceholder"
          placeholder="搜索 skills / 仓库 / 描述…"
          autocomplete="off"
        >
        <button id="search-clear" class="search-clear" data-i18n-title="searchClearTitle" title="清空">×</button>
      </div>

      <nav class="category-tabs" role="tablist" id="category-tabs">
        <!-- 动态生成 by app.js renderCategoryTabs() -->
      </nav>

      <div class="subgroup-tabs" id="subgroup-tabs" hidden></div>

      <!-- 当前分类描述（i18n 切换时更新）-->
      <div class="category-desc" id="category-desc" hidden></div>
    </section>

    <!-- Skill 卡片网格 -->
    <section class="results" id="results"></section>

    <div class="empty-state" id="empty" hidden>
      <p data-i18n="emptyState">没找到匹配的 skill 😕</p>
    </div>

    <!-- 关于 -->
    <section class="about">
      <h2 data-i18n="aboutTitle">📚 关于</h2>
      <p data-i18n-html="aboutP1"></p>
      <p data-i18n-html="aboutP2"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      <span data-i18n="license">MIT License</span> ·
      <a href="https://github.com/rdone4425/skill" target="_blank" rel="noopener" data-i18n="source">源码</a>
      · <span data-i18n="dataUpdated">数据最后更新</span> <span id="last-updated">2026-06-04</span>
    </p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
